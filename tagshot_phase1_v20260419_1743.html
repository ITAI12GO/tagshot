<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TagShot — Phase 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 10px 14px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    h1 { font-size: 17px; display: flex; align-items: center; gap: 6px; }
    .phase-tag { font-size: 11px; color: #888; margin-top: 2px; }
    .video-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    canvas { display: none; }
    .start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 10;
    }
    .start-overlay.hidden { display: none; }
    .start-btn {
      padding: 14px 32px;
      font-size: 17px;
      font-weight: 600;
      background: #ff3b3b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 12px rgba(255,59,59,0.3);
    }
    .start-btn:active { transform: scale(0.97); }
    .reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      pointer-events: none;
    }
    .reticle-corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid #ff3b3b;
    }
    .reticle-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
    .reticle-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-radius: 0 12px 0 0; }
    .reticle-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-radius: 0 0 0 12px; }
    .reticle-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-radius: 0 0 12px 0; }
    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255, 59, 59, 0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
      z-index: 5;
    }
    .flash.active { opacity: 1; }
    footer {
      padding: 10px 14px 14px;
      background: #141414;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
      max-height: 40vh;
      overflow-y: auto;
    }
    .status {
      color: #888;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .status.ok { color: #4ade80; }
    .status.err { color: #ff3b3b; }
    .counter {
      font-size: 13px;
      color: #fff;
      margin-bottom: 8px;
    }
    .counter span { color: #ff3b3b; font-weight: 600; font-size: 16px; }
    .hit-log { }
    .hit-entry {
      padding: 6px 10px;
      background: #1e1e1e;
      border-left: 3px solid #ff3b3b;
      border-radius: 4px;
      margin-top: 4px;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      word-break: break-all;
    }
    .hit-entry .time { color: #666; margin-right: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 TagShot</h1>
    <div class="phase-tag">Phase 1 — Camera + QR detection test · v20260419_1743</div>
  </header>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="reticle">
      <div class="reticle-corner tl"></div>
      <div class="reticle-corner tr"></div>
      <div class="reticle-corner bl"></div>
      <div class="reticle-corner br"></div>
    </div>
    <div class="flash" id="flash"></div>
    <div class="start-overlay" id="startOverlay">
      <div style="font-size: 56px;">🎯</div>
      <div style="margin-top: 14px; font-size: 20px; font-weight: 600;">Ready to test</div>
      <div style="margin-top: 6px; color: #aaa; font-size: 14px; max-width: 280px; line-height: 1.4;">
        Point your camera at any QR code to see it detected.
      </div>
      <button class="start-btn" id="startBtn">Start Camera</button>
      <div style="margin-top: 20px; font-size: 11px; color: #666;">Your browser will ask for camera permission.</div>
    </div>
  </div>

  <footer>
    <div class="status" id="status">Tap "Start Camera" to begin.</div>
    <div class="counter">Hits detected: <span id="counter">0</span></div>
    <div class="hit-log" id="hitLog"></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const startOverlay = document.getElementById('startOverlay');
    const statusEl = document.getElementById('status');
    const hitLog = document.getElementById('hitLog');
    const flash = document.getElementById('flash');
    const counterEl = document.getElementById('counter');

    let lastHit = '';
    let lastHitTime = 0;
    let hitCount = 0;
    const COOLDOWN_MS = 1500; // same QR won't register again within this window

    startBtn.addEventListener('click', async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('Your browser does not support camera access.', 'err');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        startOverlay.classList.add('hidden');
        setStatus('Scanning — point reticle at a QR code', 'ok');
        requestAnimationFrame(scanLoop);
      } catch (err) {
        setStatus('Camera blocked: ' + (err.message || err.name), 'err');
      }
    });

    function scanLoop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });
          if (code && code.data) handleHit(code.data);
        } catch (e) { /* ignore frame errors */ }
      }
      requestAnimationFrame(scanLoop);
    }

    function handleHit(data) {
      const now = Date.now();
      if (data === lastHit && (now - lastHitTime) < COOLDOWN_MS) return;
      lastHit = data;
      lastHitTime = now;
      hitCount++;
      counterEl.textContent = hitCount;

      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 100);

      if (navigator.vibrate) navigator.vibrate(80);

      const time = new Date().toLocaleTimeString('en-SG', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'hit-entry';
      entry.innerHTML = `<span class="time">[${time}]</span>🎯 ${escapeHtml(data)}`;
      hitLog.insertBefore(entry, hitLog.firstChild);
      while (hitLog.children.length > 10) hitLog.removeChild(hitLog.lastChild);
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
